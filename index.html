<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packliste</title>
<style>
  :root {
    --navy: #1B4D6B;
    --navy-light: #23617F;
    --steel: #4C7A8A;
    --accent: #2E8B57;
    --accent-dark: #23703F;
    --ink: #17222C;
    --paper: #FFFFFF;
    --panel: #F2F7F5;
    --line: #DCE6E2;
    --muted: #62807A;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--panel);
    background-image:
      linear-gradient(rgba(16,30,44,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(16,30,44,0.035) 1px, transparent 1px);
    background-size: 28px 28px;
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  .wrap { max-width: 760px; margin: 0 auto; }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 28px;
    padding: 22px 22px;
    background: var(--navy);
    border-radius: 8px;
    background-image: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  }

  .title-block h1 {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.3px;
    margin: 0;
    color: #FFFFFF;
  }

  .title-block p {
    margin: 6px 0 0;
    color: #A8B7C4;
    font-size: 13.5px;
    max-width: 42ch;
  }

  .stamp {
    font-weight: 700;
    font-size: 11px;
    color: #FFFFFF;
    background: var(--accent);
    padding: 6px 12px;
    border-radius: 3px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    flex-shrink: 0;
    margin-top: 4px;
    position: relative;
  }
  .stamp::before {
    content: "";
    position: absolute;
    left: -7px;
    top: 50%;
    width: 8px;
    height: 8px;
    background: var(--accent);
    transform: translateY(-50%) rotate(45deg);
  }

  #status-line {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .add-package-form {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }

  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .search-row input {
    background: var(--paper);
  }

  .no-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13.5px;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(23,34,44,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-box {
    background: var(--paper);
    border-radius: 8px;
    padding: 22px;
    max-width: 340px;
    width: 100%;
    box-shadow: 0 12px 32px rgba(0,0,0,0.25);
  }
  .modal-msg {
    font-size: 14.5px;
    color: var(--ink);
    margin-bottom: 18px;
    line-height: 1.4;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  input[type="text"] {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14.5px;
    padding: 11px 13px;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    background: var(--paper);
    color: var(--ink);
    flex: 1;
    min-width: 0;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(46,139,87,0.18);
  }

  button {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    border: 1.5px solid var(--navy);
    padding: 11px 16px;
    background: var(--navy);
    color: #FFFFFF;
    transition: transform 0.08s ease, background 0.12s ease;
    white-space: nowrap;
  }
  button:hover { background: var(--navy-light); }
  button:active { transform: scale(0.96); }
  button.secondary {
    background: transparent;
    color: var(--navy);
    border-color: var(--line);
  }
  button.secondary:hover { background: var(--panel); }
  button.ghost {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 4px 6px;
    font-size: 15px;
  }
  button.ghost:hover { color: var(--accent-dark); background: transparent; }

  .packages { display: flex; flex-direction: column; gap: 16px; }

  .package {
    background: var(--paper);
    border: 1.5px solid var(--line);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    border-left: 4px solid var(--navy);
  }

  .tape {
    position: absolute;
    top: 20px;
    left: -6px;
    width: 12px;
    height: 12px;
    background: var(--accent);
    transform: rotate(45deg);
  }

  .package-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 18px 18px 12px 24px;
  }

  .package-header h2 {
    font-size: 16.5px;
    font-weight: 700;
    margin: 0;
    color: var(--navy);
  }

  .progress-badge {
    font-size: 11.5px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1.5px solid var(--steel);
    color: var(--steel);
    flex-shrink: 0;
  }
  .progress-badge.complete {
    background: var(--accent);
    border-color: var(--accent);
    color: #FFFFFF;
  }

  .items { padding: 0 18px 8px 24px; display: flex; flex-direction: column; }

  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
  }
  .item:last-child { border-bottom: none; }

  .checkbox {
    width: 21px; height: 21px;
    border: 1.5px solid var(--steel);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
  }
  .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox.checked::after {
    content: "✓";
    color: #FFFFFF;
    font-size: 13px;
    font-weight: 700;
  }

  .item-name {
    flex: 1;
    font-size: 14.5px;
    cursor: pointer;
  }
  .item.checked .item-name {
    text-decoration: line-through;
    color: var(--muted);
  }

  .add-item-row {
    display: flex;
    gap: 8px;
    padding: 12px 18px 18px 24px;
  }
  .add-item-row input {
    font-size: 13.5px;
    padding: 8px 10px;
  }
  .add-item-row button {
    padding: 8px 13px;
    font-size: 12px;
  }

  .empty-items {
    padding: 6px 0 14px;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .big {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .del-package-btn {
    font-size: 15px;
  }

  footer {
    text-align: center;
    margin-top: 32px;
    font-size: 11.5px;
    color: var(--muted);
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title-block" style="display:flex; align-items:center; gap:14px;">
      <img id="company-logo" src="" alt="Firmenlogo" style="height:38px; display:none;">
      <div>
        <h1>Packliste</h1>
        <p>Gemeinsame Liste — du und dein Kollege könnt beide eintragen, was in die Pakete muss und was schon drin ist.</p>
      </div>
    </div>
    <div class="stamp">Geteilt</div>
  </header>

  <div id="status-line"><span class="dot"></span><span id="status-text">Lädt…</span></div>

  <form class="add-package-form" id="add-package-form">
    <input type="text" id="new-package-name" placeholder="Neues Paket, z. B. „Paket 1 – Küche“" autocomplete="off">
    <button type="submit">+ Paket</button>
  </form>

  <div class="search-row">
    <input type="text" id="search-input" placeholder="Paket suchen…" autocomplete="off">
    <button type="button" class="secondary" id="export-btn">Exportieren</button>
    <button type="button" class="secondary" id="import-btn">Importieren</button>
    <button type="button" class="secondary" id="clear-complete-btn">Erledigte löschen</button>
  </div>
  <input type="file" id="import-file" accept=".json" style="display:none">

  <div class="packages" id="packages-container"></div>
</div>

<footer>Änderungen werden automatisch in der MySQL-Datenbank gespeichert und synchronisiert.</footer>

<script>
// API-Konfiguration - Passe dies an deinen Server an
const API_URL = 'api.php';  // Pfad zur api.php Datei

let data = { packages: [] };
let saving = false;
let searchTerm = '';

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

// Native confirm()/alert() dialogs are blocked in the artifact preview
// sandbox and silently resolve as "cancel", so deletes never happened.
// This is a self-contained replacement.
function showConfirm(message, onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-msg"></div>
      <div class="modal-actions">
        <button type="button" class="secondary modal-cancel">Abbrechen</button>
        <button type="button" class="modal-confirm">Löschen</button>
      </div>
    </div>`;
  overlay.querySelector('.modal-msg').textContent = message;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('.modal-cancel').addEventListener('click', close);
  overlay.querySelector('.modal-confirm').addEventListener('click', () => { close(); onConfirm(); });
}

function showAlert(message) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-msg"></div>
      <div class="modal-actions">
        <button type="button" class="modal-ok">OK</button>
      </div>
    </div>`;
  overlay.querySelector('.modal-msg').textContent = message;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  overlay.querySelector('.modal-ok').addEventListener('click', close);
}

function setStatus(text, ok = true) {
  document.getElementById('status-text').textContent = text;
  document.querySelector('.dot').style.background = ok ? 'var(--accent)' : '#D32F2F';
}

async function loadData(silent = false) {
  try {
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error('API-Fehler');
    const result = await response.json();
    if (result.packages) {
      data = result;
    } else {
      data = { packages: [] };
    }
    render();
    if (!silent) setStatus('Synchronisiert');
  } catch (e) {
    if (!silent) {
      setStatus('Verbindungsfehler', false);
    }
  }
}

async function saveData() {
  saving = true;
  setStatus('Speichert…');
  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (!response.ok) throw new Error('API-Fehler');
    setStatus('Gespeichert');
    saving = false;
  } catch (e) {
    saving = false;
    setStatus('Speichern fehlgeschlagen', false);
  }
}

function addPackage(name) {
  data.packages.push({ id: uid(), name: name.trim(), items: [] });
  render();
  saveData();
}

function deletePackage(pkgId) {
  data.packages = data.packages.filter(p => p.id !== pkgId);
  render();
  saveData();
}

function isPackageComplete(pkg) {
  return pkg.items.length > 0 && pkg.items.every(i => i.packed);
}

function deleteCompletedPackages() {
  const completed = data.packages.filter(isPackageComplete);
  if (completed.length === 0) {
    showAlert('Aktuell ist kein Paket vollständig erledigt.');
    return;
  }
  showConfirm(`${completed.length} erledigte(s) Paket(e) löschen?`, () => {
    data.packages = data.packages.filter(p => !isPackageComplete(p));
    render();
    saveData();
  });
}

function addItem(pkgId, name) {
  const pkg = data.packages.find(p => p.id === pkgId);
  if (!pkg) return;
  pkg.items.push({ id: uid(), name: name.trim(), packed: false });
  render();
  saveData();
}

function toggleItem(pkgId, itemId) {
  const pkg = data.packages.find(p => p.id === pkgId);
  if (!pkg) return;
  const item = pkg.items.find(i => i.id === itemId);
  if (!item) return;
  item.packed = !item.packed;
  render();
  saveData();
}

function deleteItem(pkgId, itemId) {
  const pkg = data.packages.find(p => p.id === pkgId);
  if (!pkg) return;
  pkg.items = pkg.items.filter(i => i.id !== itemId);
  render();
  saveData();
}

function render() {
  const container = document.getElementById('packages-container');
  container.innerHTML = '';

  const filtered = searchTerm.trim()
    ? data.packages.filter(p => p.name.toLowerCase().includes(searchTerm.trim().toLowerCase()))
    : data.packages;

  if (data.packages.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="big">Noch keine Pakete</div>
        <div>Leg oben dein erstes Paket an.</div>
      </div>`;
    return;
  }

  if (filtered.length === 0) {
    container.innerHTML = `<div class="no-results">Kein Paket gefunden für „${searchTerm.trim()}“.</div>`;
    return;
  }

  filtered.forEach(pkg => {
    const total = pkg.items.length;
    const packedCount = pkg.items.filter(i => i.packed).length;
    const complete = total > 0 && packedCount === total;

    const pkgEl = document.createElement('div');
    pkgEl.className = 'package';

    const badgeText = total === 0 ? 'leer' : `${packedCount} / ${total} drin`;

    pkgEl.innerHTML = `
      <div class="tape"></div>
      <div class="package-header">
        <h2></h2>
        <div style="display:flex; align-items:center; gap:8px;">
          <span class="progress-badge ${complete ? 'complete' : ''}">${badgeText}</span>
          <button class="ghost del-package-btn" title="Paket löschen">✕</button>
        </div>
      </div>
      <div class="items"></div>
      <form class="add-item-row">
        <input type="text" placeholder="Gegenstand hinzufügen…" autocomplete="off">
        <button type="submit" class="secondary">+ Eintrag</button>
      </form>
    `;

    pkgEl.querySelector('h2').textContent = pkg.name;

    const itemsContainer = pkgEl.querySelector('.items');
    if (pkg.items.length === 0) {
      itemsContainer.innerHTML = '<div class="empty-items">Noch nichts eingetragen.</div>';
    } else {
      pkg.items.forEach(item => {
        const itemEl = document.createElement('div');
        itemEl.className = 'item' + (item.packed ? ' checked' : '');
        itemEl.innerHTML = `
          <div class="checkbox ${item.packed ? 'checked' : ''}"></div>
          <div class="item-name"></div>
          <button class="ghost del-item-btn" title="Eintrag entfernen">✕</button>
        `;
        itemEl.querySelector('.item-name').textContent = item.name;
        itemEl.querySelector('.checkbox').addEventListener('click', () => toggleItem(pkg.id, item.id));
        itemEl.querySelector('.item-name').addEventListener('click', () => toggleItem(pkg.id, item.id));
        itemEl.querySelector('.del-item-btn').addEventListener('click', () => deleteItem(pkg.id, item.id));
        itemsContainer.appendChild(itemEl);
      });
    }

    pkgEl.querySelector('.del-package-btn').addEventListener('click', () => {
      showConfirm(`Paket "${pkg.name}" wirklich löschen?`, () => deletePackage(pkg.id));
    });

    const addItemForm = pkgEl.querySelector('.add-item-row');
    addItemForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const input = addItemForm.querySelector('input');
      const val = input.value.trim();
      if (!val) return;
      addItem(pkg.id, val);
      input.value = '';
    });

    container.appendChild(pkgEl);
  });
}

document.getElementById('clear-complete-btn').addEventListener('click', deleteCompletedPackages);

document.getElementById('search-input').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  render();
});

document.getElementById('add-package-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = document.getElementById('new-package-name');
  const val = input.value.trim();
  if (!val) return;
  addPackage(val);
  input.value = '';
});

// Export
document.getElementById('export-btn').addEventListener('click', () => {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'packliste-export.json';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('Exportiert');
});

// Import
document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    try {
      const imported = JSON.parse(event.target.result);
      if (imported && Array.isArray(imported.packages)) {
        data = imported;
        render();
        saveData();
        setStatus('Importiert');
      } else {
        showAlert('Ungültiges Dateiformat');
      }
    } catch (err) {
      showAlert('Fehler beim Importieren: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// initial load
loadData();

// periodic sync so both colleagues see each other's changes
setInterval(() => {
  if (!saving) loadData(true);
}, 4000);
</script>
</body>
</html>
